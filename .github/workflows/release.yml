name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # v0.1.0, v1.2.3 etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'  # v0.1.0-rc1

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  compute-build-date:
    name: Compute build date
    runs-on: ubuntu-latest
    outputs:
      build_date: ${{ steps.d.outputs.build_date }}
    steps:
      - id: d
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: compute-build-date
    uses: ./.github/workflows/build-matrix.yml
    with:
      version:       ${{ github.ref_name }}
      build_date:    ${{ needs.compute-build-date.outputs.build_date }}
      commit:        ${{ github.sha }}
      artifact_name: release

  publish:
    name: Upload to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true   # auto-generates from merged PRs
          draft: ${{ contains(github.ref_name, '-rc') }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
