name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {goos: linux,   goarch: amd64}
          - {goos: linux,   goarch: arm64}
          - {goos: darwin,  goarch: amd64}
          - {goos: darwin,  goarch: arm64}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./internal/... -race -timeout=2m

      - name: Build nightly binary
        env:
          GOOS:        ${{ matrix.goos }}
          GOARCH:      ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          NIGHTLY_VERSION="nightly-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          BINARY="skein-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build \
            -ldflags="-s -w \
              -X main.version=${NIGHTLY_VERSION} \
              -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.commit=$(git rev-parse HEAD)" \
            -o "dist/${BINARY}" \
            ./cmd/skein
          cd dist && sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Compute nightly date
        id: nightly_date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build (${{ steps.nightly_date.outputs.date }})"
          body: |
            Automated nightly build from `main`.
            Commit: ${{ github.sha }}

            ⚠️ These builds are not stable. Use a versioned release for production.
          files: dist/*
          prerelease: true
          # Delete and recreate the nightly tag on each run
          # so `nightly` always points to the latest build.
