name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./internal/... -race -timeout=2m

  compute-version:
    name: Compute nightly version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.v.outputs.version }}
      build_date: ${{ steps.v.outputs.build_date }}
      commit:     ${{ steps.v.outputs.commit }}
      date:       ${{ steps.v.outputs.date }}
    steps:
      - uses: actions/checkout@v4

      - id: v
        run: |
          echo "version=nightly-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: compute-version
    uses: ./.github/workflows/build-matrix.yml
    with:
      version:       ${{ needs.compute-version.outputs.version }}
      build_date:    ${{ needs.compute-version.outputs.build_date }}
      commit:        ${{ needs.compute-version.outputs.commit }}
      artifact_name: nightly

  publish:
    name: Update nightly release
    needs: [compute-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-*
          path: dist
          merge-multiple: true

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build (${{ needs.compute-version.outputs.date }})"
          body: |
            Automated nightly build from `main`.
            Commit: ${{ github.sha }}

            ⚠️ These builds are not stable. Use a versioned release for production.
          files: dist/*
          prerelease: true
          # Delete and recreate the nightly tag on each run
          # so `nightly` always points to the latest build.
