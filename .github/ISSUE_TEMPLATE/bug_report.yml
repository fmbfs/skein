name: Bug Report
description: Something isn't working as documented
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as possible — it directly determines how fast we can fix it.

  - type: input
    id: skein-version
    attributes:
      label: skein version
      description: Run `skein --version`
      placeholder: "v0.1.0 (commit abc1234)"
    validations:
      required: true

  - type: input
    id: clangd-version
    attributes:
      label: clangd version
      description: Run `clangd --version`
      placeholder: "clangd version 18.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "Ubuntu 24.04 / linux amd64"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you get?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Have a C++ project with compile_commands.json
        2. Run `skein -m processFrame`
        3. See error / wrong output
    validations:
      required: true

  - type: textarea
    id: skein-output
    attributes:
      label: skein output
      description: Paste the full output (use `skein ... --json` if relevant)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else — compile_commands.json snippet, clangd logs, etc.
