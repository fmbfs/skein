version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - exhaustive
    - gocritic
    - godot
    - misspell
    - noctx
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - commentedOutCode
    misspell:
      locale: UK
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - godot
          - noctx
        path: _test\.go
      - linters:
          - all
        path: mock_.*\.go
      - linters:
          - misspell
        path: internal/lsp/
        source: initiali[sz]ed?
      # lipgloss.Color is the library's exported API name (US spelling) —
      # not a prose spelling error, so exempt it from the UK-locale check.
      - linters:
          - misspell
        path: internal/tui/
        source: lipgloss\.Color
      # internal/lsp.Client spawns clangd as a long-lived subprocess with a
      # deliberate synchronous, no-context design (see doc comment on
      # Client / docs/REVIEW.md §14 Q1) — CommandContext doesn't apply here.
      - linters:
          - noctx
        path: internal/lsp/client\.go
        text: exec\.Command
      # --no-color / NO_COLOR are the actual external CLI flag and
      # https://no-color.org environment variable names (US spelling by
      # convention) — not prose spelling errors, so exempt them like the
      # lipgloss.Color exemption above.
      - linters:
          - misspell
        path: internal/tree/
        source: (no-color|NO_COLOR)
      - linters:
          - misspell
        path: cmd/skein/
        source: no-color
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
