version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - exhaustive
    - gocritic
    - godot
    - misspell
    - noctx
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - commentedOutCode
    misspell:
      locale: UK
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - godot
          - noctx
        path: _test\.go
      - linters:
          - all
        path: mock_.*\.go
      - linters:
          - misspell
        path: internal/lsp/
        source: initiali[sz]ed?
      # internal/lsp.Client spawns clangd as a long-lived subprocess with a
      # deliberate synchronous, no-context design (see doc comment on
      # Client / docs/REVIEW.md §14 Q1) — CommandContext doesn't apply here.
      - linters:
          - noctx
        path: internal/lsp/client\.go
        text: exec\.Command
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
