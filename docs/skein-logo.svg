<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <title>skein</title>

  <!--
    Concept:
    - LEFT: a dense, knotted tangle of overlapping lines — this is the "head"
    - RIGHT: those same lines flow out, loosen, and resolve into a readable
             sheep silhouette — body, legs, tail
    - Reading direction = left to right = tangle to clarity
    - No fills. Lines only. Monochrome.
    - The moment of resolution (where chaos becomes structure) sits at center.
  -->

  <g stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- ═══════════════════════════════════════════════════════════════
         LEFT SIDE: THE KNOT / HEAD
         Dense overlapping curves — chaotic, compressed, unreadable
         as individual lines. Collectively they form a rough circle.
    ════════════════════════════════════════════════════════════════ -->

    <!-- Core tangle mass -->
    <path stroke-width="1.8"
      d="M 30 90 C 24 76, 28 60, 40 56 C 36 44, 48 36, 60 42
         C 64 30, 78 28, 88 38 C 96 28, 108 32, 110 44
         C 120 40, 126 52, 120 62 C 128 68, 126 82, 118 88
         C 124 96, 118 110, 106 112 C 104 122, 92 126, 82 118
         C 74 126, 60 122, 56 110 C 44 110, 36 100, 30 90 Z"/>

    <!-- Interior chaos — tight overlapping loops -->
    <path stroke-width="1.3" opacity="0.9"
      d="M 50 60 C 44 68, 42 80, 48 88 C 42 94, 44 106, 54 108"/>
    <path stroke-width="1.3" opacity="0.9"
      d="M 60 50 C 52 58, 48 70, 52 80 C 48 88, 50 100, 58 106"/>
    <path stroke-width="1.2" opacity="0.85"
      d="M 72 46 C 64 54, 60 66, 64 76 C 58 84, 60 98, 68 104"/>
    <path stroke-width="1.2" opacity="0.85"
      d="M 84 44 C 76 52, 72 64, 76 76 C 70 86, 72 100, 80 108"/>
    <path stroke-width="1.1" opacity="0.8"
      d="M 96 48 C 90 58, 88 70, 92 80 C 88 90, 90 102, 96 110"/>
    <path stroke-width="1.1" opacity="0.8"
      d="M 106 56 C 102 66, 102 80, 106 90 C 104 100, 104 110, 108 116"/>

    <!-- Tight horizontal cross-threads in the knot -->
    <path stroke-width="1.0" opacity="0.7"
      d="M 44 72 C 54 68, 66 70, 78 68 C 88 66, 100 68, 112 66"/>
    <path stroke-width="1.0" opacity="0.65"
      d="M 42 84 C 52 82, 64 84, 76 82 C 88 80, 100 82, 114 80"/>
    <path stroke-width="0.9" opacity="0.6"
      d="M 46 96 C 56 94, 68 96, 80 94 C 92 92, 104 94, 114 92"/>

    <!-- Looping knot details — the "knotted" feel -->
    <path stroke-width="1.1" opacity="0.75"
      d="M 58 64 C 50 72, 52 84, 60 88 C 54 94, 56 104, 64 106"/>
    <path stroke-width="1.0" opacity="0.7"
      d="M 78 58 C 70 66, 70 80, 76 88 C 70 96, 72 108, 80 112"/>
    <path stroke-width="1.0" opacity="0.65"
      d="M 96 62 C 90 72, 90 84, 96 92 C 92 100, 94 110, 100 114"/>

    <!-- ═══════════════════════════════════════════════════════════════
         TRANSITION ZONE: center ~x=120 to x=150
         Lines begin to separate, breathe, resolve
    ════════════════════════════════════════════════════════════════ -->

    <!-- Threads pulling apart, gaining space -->
    <path stroke-width="1.4" opacity="0.8"
      d="M 114 54 C 124 52, 134 50, 144 52 C 152 54, 158 60, 156 68"/>
    <path stroke-width="1.3" opacity="0.75"
      d="M 116 72 C 126 70, 138 68, 150 70 C 160 72, 166 80, 164 90"/>
    <path stroke-width="1.3" opacity="0.7"
      d="M 116 88 C 128 88, 140 88, 152 90 C 162 92, 168 100, 164 110"/>
    <path stroke-width="1.2" opacity="0.65"
      d="M 114 104 C 126 106, 138 108, 150 108 C 160 108, 166 114, 162 122"/>

    <!-- ═══════════════════════════════════════════════════════════════
         RIGHT SIDE: THE BODY — resolved, structured, readable
         Lines become the sheep's wool — loose, ordered, peaceful
    ════════════════════════════════════════════════════════════════ -->

    <!-- Sheep wool body outline -->
    <path stroke-width="2.2"
      d="M 152 52
         C 164 46, 180 48, 190 58
         C 202 52, 218 58, 220 70
         C 232 70, 240 82, 236 94
         C 244 102, 240 116, 228 120
         C 226 130, 214 136, 202 130
         C 194 138, 180 138, 172 130
         C 162 134, 150 128, 148 118
         C 138 112, 138 100, 146 92
         C 140 82, 142 68, 152 62
         C 150 58, 150 54, 152 52 Z"/>

    <!-- Wool texture — loose, ordered lines. Breathe between them. -->
    <path stroke-width="1.1" opacity="0.6"
      d="M 156 68 C 160 80, 160 94, 156 106"/>
    <path stroke-width="1.1" opacity="0.55"
      d="M 166 60 C 170 74, 170 90, 166 106"/>
    <path stroke-width="1.0" opacity="0.5"
      d="M 178 56 C 182 70, 182 88, 178 106"/>
    <path stroke-width="1.0" opacity="0.45"
      d="M 190 58 C 194 72, 194 90, 190 108"/>
    <path stroke-width="1.0" opacity="0.4"
      d="M 202 62 C 206 76, 206 92, 202 110"/>
    <path stroke-width="0.9" opacity="0.35"
      d="M 214 66 C 218 80, 218 96, 214 112"/>
    <path stroke-width="0.9" opacity="0.3"
      d="M 224 74 C 228 86, 228 100, 224 114"/>

    <!-- Horizontal wool strands — calm, even spacing -->
    <path stroke-width="0.9" opacity="0.4"
      d="M 150 76 C 164 74, 180 76, 196 74 C 210 72, 224 74, 234 76"/>
    <path stroke-width="0.9" opacity="0.35"
      d="M 148 90 C 162 88, 178 90, 194 88 C 210 86, 224 88, 234 90"/>
    <path stroke-width="0.8" opacity="0.3"
      d="M 150 104 C 164 102, 180 104, 196 102 C 210 100, 224 102, 232 104"/>

    <!-- ═══════════════════════════════════════════════════════════════
         LEGS — clean, minimal, geometric
    ════════════════════════════════════════════════════════════════ -->

    <!-- Four legs dropping from body base -->
    <line x1="164" y1="126" x2="162" y2="158" stroke-width="2.2"/>
    <line x1="178" y1="130" x2="178" y2="162" stroke-width="2.2"/>
    <line x1="200" y1="130" x2="200" y2="162" stroke-width="2.2"/>
    <line x1="214" y1="126" x2="216" y2="158" stroke-width="2.2"/>

    <!-- Hooves -->
    <line x1="158" y1="158" x2="166" y2="158" stroke-width="2.4"/>
    <line x1="174" y1="162" x2="182" y2="162" stroke-width="2.4"/>
    <line x1="196" y1="162" x2="204" y2="162" stroke-width="2.4"/>
    <line x1="212" y1="158" x2="220" y2="158" stroke-width="2.4"/>

    <!-- ═══════════════════════════════════════════════════════════════
         TAIL — a small loose loop, far right
         The very last thread, fully free
    ════════════════════════════════════════════════════════════════ -->
    <path stroke-width="1.6"
      d="M 234 88 C 244 84, 250 90, 248 98 C 246 106, 238 108, 234 104"/>

  </g>

</svg>
